openapi: 3.0.3
info:
  title: NFL Helper Backend API
  description: API for NFL fantasy football helper application with DFS salaries, player data, and TinyURL management
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
  - url: https://api.example.com
    description: Production server

paths:
  /:
    get:
      summary: Health check endpoint
      description: Returns a simple health check response
      operationId: healthCheck
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy

  /getplayers:
    post:
      summary: Get filtered player data
      description: Returns filtered player data based on request criteria
      operationId: getPlayers
      tags:
        - Players
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                league:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Player data retrieved successfully

  /getplayers/bestball:
    post:
      summary: Get bestball player data
      description: Returns simplified player data (id, name, position) for bestball lineups based on a list of Sleeper IDs
      operationId: getBestballPlayers
      tags:
        - Players
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerlist
              properties:
                playerlist:
                  type: array
                  items:
                    type: string
                  description: Array of Sleeper player IDs
      responses:
        "200":
          description: Bestball player data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  players:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Sleeper player ID
                        name:
                          type: string
                          description: Player full name
                        position:
                          type: string
                          description: Player position
        "400":
          description: Bad request - invalid player IDs format

  /getplayers/data:
    post:
      summary: Get all player data
      description: Returns filtered players based on a list of Sleeper IDs. Can optionally include draft picks.
      operationId: getAllPlayers
      tags:
        - Players
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerlist
              properties:
                playerlist:
                  type: array
                  items:
                    type: string
                  description: Array of Sleeper player IDs
                include_picks:
                  type: boolean
                  default: false
                  description: If true, includes draft picks in the response
      responses:
        "200":
          description: Player data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                description: Dictionary of player data keyed by Sleeper ID
                additionalProperties: true
        "400":
          description: Bad request - invalid player list format

  /dfs-salaries/data:
    get:
      summary: Get all DFS salaries data
      description: Returns all DFS salary entries in memory
      operationId: getDfsSalariesData
      tags:
        - DFS Salaries
      responses:
        "200":
          description: DFS salaries data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  players:
                    type: array
                    items:
                      type: object

  /dfs-salaries/week/{week}:
    get:
      summary: Get DFS salaries by week
      description: Returns DFS salary data for a specific week
      operationId: getDfsSalariesByWeek
      tags:
        - DFS Salaries
      parameters:
        - name: week
          in: path
          required: true
          schema:
            type: integer
          description: Week number (1-18)
      responses:
        "200":
          description: DFS salaries for the specified week
          content:
            application/json:
              schema:
                type: object
                properties:
                  week:
                    type: integer
                  players:
                    type: array
                    items:
                      type: object

  /dfs-salaries/player/{sleeper_id}:
    get:
      summary: Get DFS salaries for a specific player
      description: Returns DFS salary data for a specific player by Sleeper ID
      operationId: getDfsSalariesForPlayer
      tags:
        - DFS Salaries
      parameters:
        - name: sleeper_id
          in: path
          required: true
          schema:
            type: string
          description: Sleeper player ID
        - name: week
          in: query
          required: false
          schema:
            type: integer
          description: Optional week number to filter by
      responses:
        "200":
          description: Player DFS salary data
          content:
            application/json:
              schema:
                type: object

  /admin/dfs-salaries/update:
    post:
      summary: Manually trigger DFS salaries update
      description: Triggers a scheduled DFS salaries update. This update logs salary differences but does NOT update salaries, only other fields like dates and projections.
      operationId: adminUpdateDfsSalaries
      tags:
        - Admin
        - DFS Salaries
      responses:
        "200":
          description: DFS salaries update triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "DFS salaries update triggered successfully."

  /admin/dfs-salaries/scrape-slate:
    post:
      summary: Scrape a specific slate
      description: Scrapes a specific DFS slate and optionally updates salaries. Rejects showdown slates (showdown_flag=1) - only non-showdown slates are allowed.
      operationId: adminScrapeSpecificSlate
      tags:
        - Admin
        - DFS Salaries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    date:
                      type: string
                      format: date
                      example: "2025-11-27"
                      description: Date in YYYY-MM-DD format
                    slate_url:
                      type: string
                      example: "21A90"
                      description: Slate URL identifier
                    update_salaries:
                      type: boolean
                      default: true
                      description: If false, logs salary differences but doesn't update salaries. If true, updates all fields including salaries.
                - type: object
                  properties:
                    date_slate:
                      type: string
                      example: "2025-11-27?slate=21A90"
                      description: Combined format with date and slate URL
                    update_salaries:
                      type: boolean
                      default: true
                      description: If false, logs salary differences but doesn't update salaries. If true, updates all fields including salaries.
            examples:
              update_salaries:
                value:
                  date: "2025-11-27"
                  slate_url: "21A90"
                  update_salaries: true
              log_only:
                value:
                  date_slate: "2025-11-30?slate=21ADE"
                  update_salaries: false
      responses:
        "200":
          description: Slate scraped successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  date:
                    type: string
                  slate_url:
                    type: string
                  players_scraped:
                    type: integer
                  players_added:
                    type: integer
                  players_updated:
                    type: integer
                  matched_to_sleeper_ids:
                    type: integer
                  week:
                    type: integer
                  update_salaries:
                    type: boolean
                  salary_differences_count:
                    type: integer
                    description: Number of salary differences found (only when update_salaries=false)
                  salary_differences:
                    type: array
                    description: Array of salary differences (only when update_salaries=false)
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        team:
                          type: string
                        sleeper_id:
                          type: string
                        existing_salary:
                          type: integer
                        new_salary:
                          type: integer
                        difference:
                          type: integer
        "400":
          description: Bad request - invalid date format or showdown slate rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /admin/dfs-salaries/check/{sleeper_id}/{week}:
    get:
      summary: Check if DFS salary data exists for a player
      description: Checks if DFS salary data exists for a specific player and week
      operationId: adminCheckDfsData
      tags:
        - Admin
        - DFS Salaries
      parameters:
        - name: sleeper_id
          in: path
          required: true
          schema:
            type: string
          description: Sleeper player ID
        - name: week
          in: path
          required: true
          schema:
            type: integer
          description: Week number
      responses:
        "200":
          description: Data found
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  key:
                    type: string
                  data:
                    type: object
        "404":
          description: Data not found

  /tinyurl/create:
    post:
      summary: Create a new TinyURL entry
      description: Creates a new TinyURL entry with multiple user entries in a single request
      operationId: createTinyurl
      tags:
        - TinyURL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - week
                - entries
              properties:
                name:
                  type: string
                  maxLength: 20
                  description: Entry name (max 20 characters)
                week:
                  type: integer
                  description: Week number
                type:
                  type: string
                  enum: ["single", "multiweek_dfs"]
                  default: "single"
                  description: Entry type - 'single' for regular entries, 'multiweek_dfs' for multiweek DFS with standings tracking
                entries:
                  type: array
                  description: Array of user entries
                  items:
                    type: object
                    required:
                      - name
                      - data
                    properties:
                      name:
                        type: string
                      data:
                        type: string
                        nullable: true
      responses:
        "200":
          description: TinyURL entry created successfully
        "400":
          description: Bad request - validation error

  /tinyurl/create/empty:
    post:
      summary: Create an empty TinyURL entry
      description: Creates an empty TinyURL entry with allowed usernames that can be populated later
      operationId: createEmptyTinyurl
      tags:
        - TinyURL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - names
              properties:
                name:
                  type: string
                  maxLength: 20
                  description: Entry name (max 20 characters)
                names:
                  type: array
                  items:
                    type: string
                  description: List of allowed usernames (cannot be empty)
                week:
                  type: integer
                  description: Optional week number
                type:
                  type: string
                  enum: ["single", "multiweek_dfs"]
                  default: "single"
                  description: Entry type - 'single' for regular entries, 'multiweek_dfs' for multiweek DFS with standings tracking
                reveal:
                  type: string
                  format: date-time
                  description: Optional reveal date/time in ISO 8601 UTC format
      responses:
        "200":
          description: Empty TinyURL entry created successfully
        "400":
          description: Bad request - validation error

  /tinyurl/{name}/data:
    get:
      summary: Get TinyURL entry data
      description: Retrieves the stored data for a TinyURL entry by name. If a username is provided, returns data only for that specific user. If the entry has a PIN, it must be provided as a query parameter to access the data. Returns no data if PIN is required but missing or incorrect.
      operationId: getTinyurlData
      tags:
        - TinyURL
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the TinyURL entry
        - name: username
          in: query
          required: false
          schema:
            type: string
          description: Optional username. If provided, returns data only for that specific user instead of the main entry data.
        - name: pin
          in: query
          required: false
          schema:
            type: string
            pattern: "^[0-9]{2,8}$"
          description: Optional PIN code (2-8 digits). Required if entry/user has a PIN stored.
      responses:
        "200":
          description: TinyURL entry data (or no data if PIN required but missing/incorrect)
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  data:
                    type: string
                    nullable: true
                    description: Data content, or null if PIN required but missing/incorrect
                  pin_required:
                    type: boolean
                    description: True if PIN is required but missing or incorrect
                  message:
                    type: string
                    description: Message explaining why data is not available (if PIN required)
                  created_at:
                    type: string
                  allowed_names:
                    type: array
                    items:
                      type: string
                  week:
                    type: integer
                  reveal:
                    type: string
                  updated_at:
                    type: string
                  updated_by:
                    type: string
                  user_submissions:
                    type: object
                  username:
                    type: string
                    description: Username (only present when username query parameter is provided)
                  update_count:
                    type: integer
                    description: Number of times user has updated their data (only present when username query parameter is provided)
        "404":
          description: Entry not found

  /tinyurl/{name}/details:
    get:
      summary: Get TinyURL entry details
      description: Returns detailed submission information for a TinyURL entry
      operationId: getTinyurlDetails
      tags:
        - TinyURL
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry details
        "404":
          description: Entry not found

  /tinyurl/{name}/standings:
    get:
      summary: Get standings for multiweek_dfs entry
      description: Returns standings for a multiweek_dfs TinyURL entry, sorted by total points (descending). Only works for entries with type='multiweek_dfs'.
      operationId: getTinyurlStandings
      tags:
        - TinyURL
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The name of the TinyURL entry
      responses:
        "200":
          description: Standings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  type:
                    type: string
                    enum: ["multiweek_dfs"]
                  standings:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                        total_points:
                          type: number
                          format: float
                        week_points:
                          type: object
                          description: Dictionary mapping week numbers to points for that week
                        last_updated:
                          type: string
                          format: date-time
                  count:
                    type: integer
        "400":
          description: Entry is not a multiweek_dfs type
        "404":
          description: Entry not found

  /tinyurl/{name}/recalc:
    post:
      summary: Recalculate standings
      description: Recalculates standings for a multiweek_dfs TinyURL entry based on current lineup data. Only works for entries with type='multiweek_dfs'.
      operationId: recalcTinyurlStandings
      tags:
        - TinyURL
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The name of the TinyURL entry
      responses:
        "200":
          description: Standings recalculated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        "400":
          description: Entry is not a multiweek_dfs type
        "404":
          description: Entry not found

  /tinyurl/{name}/set-points:
    post:
      summary: Manually set points for user/week
      description: Manually set points for a specific user and week in a multiweek_dfs TinyURL entry. Only works for entries with type='multiweek_dfs'.
      operationId: setTinyurlPoints
      tags:
        - TinyURL
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The name of the TinyURL entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - week
                - points
              properties:
                username:
                  type: string
                  description: Username to set points for
                week:
                  type: integer
                  description: Week number
                points:
                  type: number
                  format: float
                  description: Points to set for this user/week
      responses:
        "200":
          description: Points set successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  username:
                    type: string
                  week:
                    type: integer
                  points:
                    type: number
                    format: float
                  total_points:
                    type: number
                    format: float
                    description: Updated total points for this user
                  timestamp:
                    type: string
                    format: date-time
        "400":
          description: Bad request - validation error or entry is not multiweek_dfs type
        "404":
          description: Entry not found

  /tinyurl/{username}/available:
    get:
      summary: Get available TinyURLs for a username
      description: Returns all TinyURL entry names where the username is in the allowed_names list
      operationId: getTinyurlsByUsername
      tags:
        - TinyURL
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: Username to search for
      responses:
        "200":
          description: List of available TinyURL entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        has_data:
                          type: boolean
                        has_pin:
                          type: boolean
                          description: True if the entry has a PIN stored (from any user submission)
                        week:
                          type: integer
                  count:
                    type: integer

  /tinyurl/count:
    get:
      summary: Get TinyURL entry count
      description: Returns the current count of TinyURL entries and remaining capacity
      operationId: getTinyurlCount
      tags:
        - TinyURL
      responses:
        "200":
          description: Count information
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  max_entries:
                    type: integer
                    example: 10
                  remaining:
                    type: integer

  /tinyurl/list:
    get:
      summary: List all TinyURL entries
      description: Returns a list of all stored TinyURL entries with metadata
      operationId: listTinyurls
      tags:
        - TinyURL
      responses:
        "200":
          description: List of all entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_entries:
                    type: integer
                  entries:
                    type: array
                    items:
                      type: object

  /tinyurl/{name}:
    delete:
      summary: Delete a TinyURL entry
      description: Deletes a stored TinyURL entry by name
      operationId: deleteTinyurl
      tags:
        - TinyURL
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry deleted successfully
        "404":
          description: Entry not found

  /tinyurl/{tinyurl_name}/add:
    post:
      summary: Add data to an existing TinyURL entry
      description: Adds or updates data for a specific username in an existing TinyURL entry
      operationId: addToTinyurl
      tags:
        - TinyURL
      parameters:
        - name: tinyurl_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - data
              properties:
                name:
                  type: string
                  description: Username to add/update data for
                data:
                  type: string
                  description: Data to store
                pin:
                  type: string
                  pattern: "^[0-9]{2,8}$"
                  description: Optional PIN code (2-8 digits, numbers only). Stored with the user's submission data.
                skip_validation:
                  type: boolean
                  default: false
                  description: Optional flag to bypass lineup validation (e.g., for adding lineups after games have started). Defaults to false.
      responses:
        "200":
          description: Data added/updated successfully
        "400":
          description: Bad request
        "404":
          description: TinyURL entry not found

  /tinyurl/{name}/{username}/check:
    get:
      summary: Check if username has data in a league
      description: Checks if a specific username has data stored in a specific TinyURL entry (league)
      operationId: checkUsernameDataInLeague
      tags:
        - TinyURL
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: TinyURL entry name (league)
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: Username to check
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  username:
                    type: string
                  has_data:
                    type: boolean
                  has_pin:
                    type: boolean
                    description: True if the username's submission has a PIN stored
                  update_count:
                    type: integer
                  created_at:
                    type: string
                  updated_at:
                    type: string

  /fantasy-points/data:
    get:
      summary: Get all fantasy points data
      description: Returns all fantasy points data stored in memory
      operationId: getFantasyPointsData
      tags:
        - Fantasy Points
      responses:
        "200":
          description: Fantasy points data

  /fantasy-points/week/{week}:
    get:
      summary: Get fantasy points by week
      description: Returns fantasy points data for a specific week
      operationId: getFantasyPointsByWeek
      tags:
        - Fantasy Points
      parameters:
        - name: week
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fantasy points for the specified week

  /fantasy-points/player/{sleeper_id}:
    get:
      summary: Get fantasy points for a player
      description: Returns fantasy points data for a specific player
      operationId: getFantasyPointsForPlayer
      tags:
        - Fantasy Points
      parameters:
        - name: sleeper_id
          in: path
          required: true
          schema:
            type: string
        - name: week
          in: query
          required: false
          schema:
            type: integer
          description: Optional week number to filter by
      responses:
        "200":
          description: Player fantasy points data

  /admin/fantasy-points/update:
    post:
      summary: Manually trigger fantasy points update
      description: Triggers a manual update of fantasy points data
      operationId: adminUpdateFantasyPoints
      tags:
        - Admin
        - Fantasy Points
      responses:
        "200":
          description: Update triggered successfully

  /admin/fantasy-points/update-week/{week}:
    post:
      summary: Update fantasy points for a specific week
      description: Updates fantasy points data for a specific week
      operationId: updateFantasyPointsForWeek
      tags:
        - Admin
        - Fantasy Points
      parameters:
        - name: week
          in: path
          required: true
          schema:
            type: integer
          description: Week number to update (1-18)
      responses:
        "200":
          description: Update completed successfully
        "404":
          description: No data found for the specified week

  /tournament:
    post:
      summary: Create a new tournament
      description: 'Creates a new tournament. Supports two types: "h2h" (head-to-head with games) and "pts" (points-based with players list). Maximum of 10 tournaments at any time. Old tournaments are automatically cleared (keeps current and previous week).'
      operationId: createTournament
      tags:
        - Tournament
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  description: 'Head-to-head tournament (type: "h2h")'
                  required:
                    - week
                    - name
                    - type
                    - games
                  properties:
                    week:
                      type: integer
                      description: Week number
                    name:
                      type: string
                      description: Tournament name
                    type:
                      type: string
                      enum: ["h2h"]
                      description: Tournament type - head-to-head
                    games:
                      type: array
                      description: Array of game matchups
                      items:
                        type: object
                        required:
                          - player1
                          - player2
                        properties:
                          player1:
                            type: object
                            required:
                              - league_name
                              - leagie_position
                              - league
                              - playername
                              - playerid
                            properties:
                              league_name:
                                type: string
                              leagie_position:
                                type: string
                              league:
                                type: string
                              playername:
                                type: string
                              playerid:
                                type: string
                          player2:
                            type: object
                            required:
                              - league_name
                              - leagie_position
                              - league
                              - playername
                              - playerid
                            properties:
                              league_name:
                                type: string
                              leagie_position:
                                type: string
                              league:
                                type: string
                              playername:
                                type: string
                              playerid:
                                type: string
                - type: object
                  description: 'Points-based tournament (type: "pts")'
                  required:
                    - week
                    - name
                    - type
                    - players
                  properties:
                    week:
                      type: integer
                      description: Week number
                    name:
                      type: string
                      description: Tournament name
                    id:
                      type: string
                      description: Optional custom tournament ID
                    type:
                      type: string
                      enum: ["pts"]
                      description: Tournament type - points-based
                    players:
                      type: array
                      description: Array of players
                      items:
                        type: object
                        required:
                          - league_name
                          - leagie_position
                          - league
                          - playername
                          - playerid
                        properties:
                          league_name:
                            type: string
                          leagie_position:
                            type: string
                          league:
                            type: string
                          playername:
                            type: string
                          playerid:
                            type: string
      responses:
        "201":
          description: Tournament created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Generated tournament ID
                  week:
                    type: integer
                  name:
                    type: string
                  type:
                    type: string
                    enum: ["h2h", "pts"]
                    description: Tournament type
                  games:
                    type: array
                    description: Games array (for type "h2h")
                    items:
                      type: object
                  players:
                    type: array
                    description: Players array (for type "pts")
                    items:
                      type: object
                  created_at:
                    type: string
                    format: date-time
        "400":
          description: Bad request - validation error or maximum tournaments reached
        "500":
          description: Server error

  /tournament/list:
    get:
      summary: List all tournaments
      description: Returns a simplified list of all tournaments with id, name, week, and number of participants
      operationId: listTournaments
      tags:
        - Tournament
      responses:
        "200":
          description: List of tournaments retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournaments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Tournament ID
                        name:
                          type: string
                          description: Tournament name
                        week:
                          type: integer
                          description: Week number
                        participants:
                          type: integer
                          description: Number of unique participants across all games
                  count:
                    type: integer
                    description: Number of tournaments
        "500":
          description: Server error

  /tournament/{id}:
    get:
      summary: Get tournament by ID
      description: Retrieves the full tournament data that was provided when creating the tournament
      operationId: getTournament
      tags:
        - Tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Tournament ID
      responses:
        "200":
          description: Tournament data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Tournament ID
                  week:
                    type: integer
                    description: Week number
                  name:
                    type: string
                    description: Tournament name
                  type:
                    type: string
                    enum: ["h2h", "pts"]
                    description: Tournament type
                  games:
                    type: array
                    description: Array of game matchups with player1 and player2 (for type "h2h")
                    items:
                      type: object
                      properties:
                        player1:
                          type: object
                          properties:
                            league_name:
                              type: string
                            leagie_position:
                              type: string
                            league:
                              type: string
                            playername:
                              type: string
                            playerid:
                              type: string
                        player2:
                          type: object
                          properties:
                            league_name:
                              type: string
                            leagie_position:
                              type: string
                            league:
                              type: string
                            playername:
                              type: string
                            playerid:
                              type: string
                  players:
                    type: array
                    description: Array of players (for type "pts")
                    items:
                      type: object
                      properties:
                        league_name:
                          type: string
                        leagie_position:
                          type: string
                        league:
                          type: string
                        playername:
                          type: string
                        playerid:
                          type: string
                  created_at:
                    type: string
                    format: date-time
                    description: Tournament creation timestamp
        "404":
          description: Tournament not found
        "500":
          description: Server error

  /admin/tournament/{id}:
    delete:
      summary: Delete tournament (Admin)
      description: Admin endpoint to delete a tournament by ID
      operationId: adminDeleteTournament
      tags:
        - Admin
        - Tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Tournament ID to delete
      responses:
        "200":
          description: Tournament deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  deleted_tournament:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      week:
                        type: integer
        "404":
          description: Tournament not found
        "500":
          description: Server error

  /admin/tournament/cleanup:
    post:
      summary: Manually trigger tournament cleanup (Admin)
      description: Admin endpoint to manually trigger tournament data cleanup. This runs the same cleanup logic as the scheduled job (runs automatically every Thursday at 09:00 UTC). Removes tournaments with weeks older than the current week, keeping current week and all future weeks.
      operationId: adminTriggerTournamentCleanup
      tags:
        - Admin
        - Tournament
      responses:
        "200":
          description: Cleanup completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Tournament cleanup completed successfully"
                  timestamp:
                    type: string
                    format: date-time
        "500":
          description: Server error

  /admin/tinyurl/cleanup:
    post:
      summary: Manually trigger TinyURL cleanup (Admin)
      description: Admin endpoint to manually trigger TinyURL data cleanup. This runs the same cleanup logic as the scheduled job (runs automatically every Thursday at 09:00 UTC). Removes TinyURL entries with weeks older than the current week, keeping current week and all future weeks.
      operationId: adminTriggerTinyurlCleanup
      tags:
        - Admin
        - TinyURL
      responses:
        "200":
          description: Cleanup completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "TinyURL cleanup completed successfully"
                  timestamp:
                    type: string
                    format: date-time
        "500":
          description: Server error

  /admin/tinyurl/{name}/data:
    get:
      summary: Get TinyURL data (Admin, bypasses PIN)
      description: Admin endpoint to get TinyURL entry data, bypassing all PIN requirements. Returns all data including user_submissions without requiring any PINs. Useful for backups and administrative access.
      operationId: adminGetTinyurlData
      tags:
        - Admin
        - TinyURL
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: The name of the TinyURL entry
        - name: username
          in: query
          required: false
          schema:
            type: string
          description: Optional - if provided, returns data only for that specific username
      responses:
        "200":
          description: TinyURL data retrieved successfully (PIN bypassed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  data:
                    type: string
                  user_submissions:
                    type: object
                    description: All user submissions including PINs (admin access only)
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
        "404":
          description: TinyURL entry not found
        "500":
          description: Server error

  /statistics:
    get:
      summary: Get API statistics
      description: Returns request statistics and data counts
      operationId: getStatistics
      tags:
        - Statistics
      responses:
        "200":
          description: Statistics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_statistics:
                    type: object
                  dfs_salaries_weeks:
                    type: array
                    items:
                      type: integer

  /admin/debug:
    get:
      summary: Debug information
      description: Returns debug information about global variables and data counts
      operationId: debugInfo
      tags:
        - Admin
      responses:
        "200":
          description: Debug information
          content:
            application/json:
              schema:
                type: object
                properties:
                  all_players_count:
                    type: integer
                  filtered_players_count:
                    type: integer
                  dfs_salaries_count:
                    type: integer
                  fantasy_points_count:
                    type: integer

  /stats/players:
    get:
      summary: Top players by PPR fantasy points
      description: Returns top players sorted by season fantasy_points_ppr. Supports filtering by position, team, or a specific week.
      operationId: statsListPlayers
      tags:
        - Stats
      parameters:
        - name: position
          in: query
          schema:
            type: string
            enum: [QB, RB, WR, TE, K]
          description: Filter by position
        - name: team
          in: query
          schema:
            type: string
          description: Filter by team abbreviation (e.g. MIN)
        - name: week
          in: query
          schema:
            type: integer
          description: If provided, return stats for that specific week instead of season totals
        - name: limit
          in: query
          schema:
            type: integer
            default: 300
            maximum: 500
          description: Max number of players to return
      responses:
        "200":
          description: List of players with stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerSummary"

  /stats/teams:
    get:
      summary: All 32 teams with stats and schedule info
      description: Returns all teams in one call, sorted by abbreviation. Includes offensive stats, defensive allowed stats, and defensive fpts allowed per position with rolling averages.
      operationId: statsAllTeams
      tags:
        - Stats
      responses:
        "200":
          description: List of all teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamStats"

  /stats/players/team/{team}:
    get:
      summary: All players for a team
      description: Returns all players on a given team sorted by season fantasy_points_ppr.
      operationId: statsPlayersByTeam
      tags:
        - Stats
      parameters:
        - name: team
          in: path
          required: true
          schema:
            type: string
          description: Team abbreviation (e.g. MIN)
      responses:
        "200":
          description: List of players on the team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerDetail"

  /stats/player/{sleeper_id}:
    get:
      summary: Full stats for a single player
      description: Returns season totals, weekly breakdown, and rolling averages for a player.
      operationId: statsPlayerDetail
      tags:
        - Stats
      parameters:
        - name: sleeper_id
          in: path
          required: true
          schema:
            type: string
          description: Sleeper platform player ID
      responses:
        "200":
          description: Player stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"
        "404":
          description: Player not found

  /stats/player/{sleeper_id}/advanced:
    get:
      summary: Advanced stats for a single player
      description: Returns snap percentage, expected fantasy points, and actual vs expected differentials per week.
      operationId: statsPlayerAdvanced
      tags:
        - Stats
      parameters:
        - name: sleeper_id
          in: path
          required: true
          schema:
            type: string
          description: Sleeper platform player ID
      responses:
        "200":
          description: Advanced player stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  sleeper_id:
                    type: string
                  snap_pct_avg:
                    type: number
                    description: Season average snap percentage
                  expected_fp_avg:
                    type: number
                    description: Season average expected fantasy points
                  fp_diff_avg:
                    type: number
                    description: Season average actual minus expected fantasy points
                  weekly:
                    type: array
                    items:
                      type: object
                      properties:
                        week:
                          type: integer
                        snap_pct:
                          type: number
                        expected_fp:
                          type: number
                        actual_fp:
                          type: number
                        fp_diff:
                          type: number
        "404":
          description: No advanced data for player

  /stats/week/{week}:
    get:
      summary: All player stats for a specific week
      description: Returns every player who has stats recorded for the given week.
      operationId: statsForWeek
      tags:
        - Stats
      parameters:
        - name: week
          in: path
          required: true
          schema:
            type: integer
          description: NFL week number
      responses:
        "200":
          description: Map of sleeper_id to player week stats
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/PlayerWeekStats"
        "404":
          description: No data for that week

  /stats/projections/week/{week}:
    get:
      summary: Projections for all players for a given week
      description: Rolling-average projections adjusted for game total (over/under). Supports filtering by position or team.
      operationId: statsProjectionsForWeek
      tags:
        - Stats
      parameters:
        - name: week
          in: path
          required: true
          schema:
            type: integer
          description: NFL week number to project
        - name: position
          in: query
          schema:
            type: string
            enum: [QB, RB, WR, TE, K]
          description: Filter by position
        - name: team
          in: query
          schema:
            type: string
          description: Filter by team abbreviation
        - name: limit
          in: query
          schema:
            type: integer
            default: 300
            maximum: 500
          description: Max number of players to return
      responses:
        "200":
          description: List of projected players sorted by projected PPR points
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    sleeper_id:
                      type: string
                    name:
                      type: string
                    position:
                      type: string
                    team:
                      type: string
                    projected_ppr:
                      type: number
                    projected_standard:
                      type: number

  /stats/schedule/{week}:
    get:
      summary: Schedule and Vegas lines for a week
      description: Returns all matchups for a given week including spread, total, weather, moneylines, and starting QBs.
      operationId: statsScheduleForWeek
      tags:
        - Stats
      parameters:
        - name: week
          in: path
          required: true
          schema:
            type: integer
          description: NFL week number
      responses:
        "200":
          description: Schedule data for the week
          content:
            application/json:
              schema:
                type: object
                properties:
                  week:
                    type: integer
                  season:
                    type: integer
                  games:
                    type: array
                    items:
                      $ref: "#/components/schemas/Game"
        "404":
          description: No schedule data for that week

  /stats/team/{team}:
    get:
      summary: Team-level stats and current week schedule
      description: Returns offensive pace, scoring, and defensive allowed stats plus the team's current week matchup info.
      operationId: statsTeam
      tags:
        - Stats
      parameters:
        - name: team
          in: path
          required: true
          schema:
            type: string
          description: Team abbreviation (e.g. MIN)
      responses:
        "200":
          description: Team stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamStats"
        "404":
          description: No data for that team

  /stats/status:
    get:
      summary: Stats pipeline health
      description: Returns last update time, current season, and counts for all in-memory data stores.
      operationId: statsStatus
      tags:
        - Stats
      responses:
        "200":
          description: Pipeline status
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_updated:
                    type: string
                    format: date-time
                  current_season:
                    type: integer
                  player_count:
                    type: integer
                  advanced_count:
                    type: integer
                  team_count:
                    type: integer
                  schedule_weeks:
                    type: array
                    items:
                      type: integer

  /picks/data:
    get:
      summary: Get all draft picks
      description: Returns all dynasty draft pick data with values and metadata.
      operationId: getPicksData
      tags:
        - Players
      responses:
        "200":
          description: Draft picks keyed by Pick ID
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object

  /teams:
    get:
      summary: Get team injury data
      description: Returns players with active injury statuses grouped by NFL team abbreviation.
      operationId: getTeams
      tags:
        - Teams
      responses:
        "200":
          description: Injured players per team
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: object
                    properties:
                      first_name:
                        type: string
                      last_name:
                        type: string
                      injury_status:
                        type: string

  /teams/schedules:
    get:
      summary: Get 2025 NFL team schedules
      description: Returns the full 2025 NFL regular season schedule for all teams.
      operationId: getTeamSchedules
      tags:
        - Teams
      responses:
        "200":
          description: Schedule data keyed by team abbreviation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object

  /admin/rankings/update:
    post:
      summary: Trigger rankings update
      description: Manually triggers a scrape and refresh of dynasty player rankings.
      operationId: adminUpdateRankings
      tags:
        - Admin
      responses:
        "200":
          description: Update triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/dfs-salaries/add-test-data:
    post:
      summary: Add DFS salary test data
      description: Manually injects a test player entry into the in-memory DFS salaries store.
      operationId: adminAddDfsSalariesTestData
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sleeper_id
                - week
                - data
              properties:
                sleeper_id:
                  type: string
                  example: "12547"
                week:
                  type: integer
                  example: 11
                data:
                  type: object
                  description: Arbitrary player salary/game data to store
      responses:
        "200":
          description: Test data added
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  key:
                    type: string
                  data:
                    type: object
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/assign-random-deltas:
    post:
      summary: Assign random KTC/FC deltas
      description: Assigns random delta values (-50 to 50) to KTC Value and FC Value for all players. Used for testing.
      operationId: adminAssignRandomDeltas
      tags:
        - Admin
      responses:
        "200":
          description: Deltas assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /admin/trigger-fetch:
    post:
      summary: Trigger full data fetch
      description: Manually triggers fetch_and_filter_data to refresh all in-memory player data.
      operationId: adminTriggerFetch
      tags:
        - Admin
      responses:
        "200":
          description: Fetch triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    MatchupBlock:
      type: object
      properties:
        week:
          type: integer
          nullable: true
        opponent:
          type: string
          nullable: true
        is_home:
          type: boolean
          nullable: true
        spread:
          type: number
          nullable: true
        total:
          type: number
          nullable: true
        def_fpts_allowed_season:
          type: number
          nullable: true
          description: Opponent's season avg fpts allowed to this player's position (1 PPR)
        def_fpts_allowed_rolling3:
          type: number
          nullable: true
          description: Opponent's rolling 3-game avg fpts allowed to this player's position
        def_fpts_allowed_rolling5:
          type: number
          nullable: true
          description: Opponent's rolling 5-game avg fpts allowed to this player's position
        opponent_rank_season:
          type: integer
          nullable: true
          description: Opponent's season rank vs this player's position (1 = hardest matchup, 32 = easiest)
        opponent_rank_rolling5:
          type: integer
          nullable: true
          description: Opponent's rolling 5-game rank vs this player's position

    PlayerSummary:
      type: object
      properties:
        sleeper_id:
          type: string
        name:
          type: string
        position:
          type: string
        team:
          type: string
        fantasy_points_ppr:
          type: number
        fantasy_points:
          type: number
        targets:
          type: integer
        receptions:
          type: integer
        receiving_yards:
          type: number
        receiving_tds:
          type: integer
        carries:
          type: integer
        rushing_yards:
          type: number
        rushing_tds:
          type: integer
        passing_yards:
          type: number
        passing_tds:
          type: integer
        matchup:
          $ref: "#/components/schemas/MatchupBlock"

    PlayerWeekStats:
      type: object
      properties:
        name:
          type: string
        position:
          type: string
        team:
          type: string
        week:
          type: integer
        fantasy_points_ppr:
          type: number
        fantasy_points:
          type: number
        targets:
          type: integer
        receptions:
          type: integer
        receiving_yards:
          type: number
        receiving_tds:
          type: integer
        carries:
          type: integer
        rushing_yards:
          type: number
        rushing_tds:
          type: integer
        passing_yards:
          type: number
        passing_tds:
          type: integer
        snap_pct:
          type: number
        target_share:
          type: number
        wopr:
          type: number

    PlayerDetail:
      type: object
      properties:
        sleeper_id:
          type: string
        name:
          type: string
        position:
          type: string
        team:
          type: string
        gsis_id:
          type: string
        season_totals:
          $ref: "#/components/schemas/PlayerSummary"
        weekly:
          type: array
          items:
            $ref: "#/components/schemas/PlayerWeekStats"
        rolling_3:
          type: object
          description: 3-week rolling averages for key stats
        rolling_5:
          type: object
          description: 5-week rolling averages for key stats

    Game:
      type: object
      properties:
        game_id:
          type: string
        gameday:
          type: string
          format: date
        home_team:
          type: string
        away_team:
          type: string
        spread_line:
          type: number
          description: Vegas spread (negative = home favored)
        total_line:
          type: number
          description: Vegas over/under
        home_moneyline:
          type: number
        away_moneyline:
          type: number
        home_score:
          type: integer
          nullable: true
        away_score:
          type: integer
          nullable: true
        temp:
          type: number
          nullable: true
        wind:
          type: number
          nullable: true
        roof:
          type: string
          nullable: true
        surface:
          type: string
          nullable: true
        home_qb:
          type: string
          nullable: true
        away_qb:
          type: string
          nullable: true

    TeamStats:
      type: object
      properties:
        team:
          type: string
        season:
          type: integer
        games_played:
          type: integer
        pass_attempts_per_game:
          type: number
        rush_attempts_per_game:
          type: number
        plays_per_game:
          type: number
          description: Pass attempts + rush attempts per game
        targets_per_game:
          type: number
        passing_yards_per_game:
          type: number
        rushing_yards_per_game:
          type: number
        fpts_per_game:
          type: number
          description: Total offensive fantasy points scored (1 PPR) per game
        passing_tds_per_game:
          type: number
        rushing_tds_per_game:
          type: number
        passing_epa_per_game:
          type: number
        rushing_epa_per_game:
          type: number
        def_pass_yards_allowed_per_game:
          type: number
        def_rush_yards_allowed_per_game:
          type: number
        def_pass_tds_allowed_per_game:
          type: number
        def_rush_tds_allowed_per_game:
          type: number
        def_targets_allowed_per_game:
          type: number
        def_sacks_per_game:
          type: number
        def_interceptions_per_game:
          type: number
        def_pass_defended_per_game:
          type: number
        def_fpts_allowed_qb_per_game:
          type: number
          description: Season avg fantasy points (1 PPR) allowed to opposing QBs per game
